[tools]
swift = "6.3.3"

[tasks.build]
description = "Build the CLI for development"
raw_args = true
run = "swift build"

[tasks."build:release"]
description = "Build the optimized CLI"
raw_args = true
run = "swift build -c release"

[tasks."sdk:install:linux"]
description = "Install the matching Static Linux SDK"
run = '''
sdk="swift-6.3.3-RELEASE_static-linux-0.1.0"
if ! swift sdk list | grep -qx "$sdk"; then
  swift sdk install \
    https://download.swift.org/swift-6.3.3-release/static-sdk/swift-6.3.3-RELEASE/swift-6.3.3-RELEASE_static-linux-0.1.0.artifactbundle.tar.gz \
    --checksum 87c3eaf908e67c0e13a84367119e12273cec1d2cd3d81f7d74bb36722d6b607b
fi
'''

[tasks."build:release:macos:arm64"]
description = "Build the arm64 macOS release"
raw_args = true
run = "swift build -c release --product vid --triple arm64-apple-macosx13.0 --scratch-path .build/release-arm64"

[tasks."build:release:macos:x86_64"]
description = "Build the x86_64 macOS release"
raw_args = true
run = "swift build -c release --product vid --triple x86_64-apple-macosx13.0 --scratch-path .build/release-x86_64"

[tasks."build:release:macos"]
description = "Build the universal macOS release"
depends = ["build:release:macos:arm64", "build:release:macos:x86_64"]
run = '''
arm64_bin="$(mise run build:release:macos:arm64 -- --show-bin-path)"
x86_64_bin="$(mise run build:release:macos:x86_64 -- --show-bin-path)"
mkdir -p staging/macos
lipo -create "$arm64_bin/vid" "$x86_64_bin/vid" -output staging/macos/vid
strip -x staging/macos/vid
staging/macos/vid --version
'''

[tasks."build:release:linux:x86_64"]
description = "Build the x86_64 static Linux release"
depends = ["sdk:install:linux"]
raw_args = true
run = "swift build -c release --product vid --swift-sdk x86_64-swift-linux-musl --scratch-path .build/release-linux-x86_64"

[tasks."build:release:linux:arm64"]
description = "Build the arm64 static Linux release"
depends = ["sdk:install:linux"]
raw_args = true
run = "swift build -c release --product vid --swift-sdk aarch64-swift-linux-musl --scratch-path .build/release-linux-aarch64"

[tasks."build:release:linux"]
description = "Build the static Linux releases"
depends = ["build:release:linux:x86_64", "build:release:linux:arm64"]
run = '''
x86_64_bin="$(mise run build:release:linux:x86_64 -- --show-bin-path)"
arm64_bin="$(mise run build:release:linux:arm64 -- --show-bin-path)"
mkdir -p staging/linux-x86_64 staging/linux-aarch64
llvm_objcopy="$(mise where swift)/usr/bin/llvm-objcopy"
"$llvm_objcopy" --strip-all "$x86_64_bin/vid" staging/linux-x86_64/vid
"$llvm_objcopy" --strip-all "$arm64_bin/vid" staging/linux-aarch64/vid
'''

[tasks."build:all"]
description = "Build all macOS and Linux release binaries"
depends = ["build:release:macos", "build:release:linux"]

[tasks.run]
description = "Build and run the CLI"
raw_args = true
run = "swift run vid"

[tasks.test]
description = "Run the unit test suite"
raw_args = true
run = "swift test --filter VidTests"

[tasks."test:integration"]
description = "Run integration tests against FFmpeg and ffprobe on PATH"
raw_args = true
run = "swift test --filter VidIntegrationTests"

[tasks.docs]
description = "Build DocC archives for every documented target"
run = '''
mise run docs:command-execution
mise run docs:ffmpeg
mise run docs:ffprobe
mise run docs:media-discovery
mise run docs:media-processing
mise run docs:media-conversion
mise run docs:media-encoding
mise run docs:media-remux
mise run docs:media-repair
mise run docs:media-subtitles
'''

[tasks."docs:prepare"]
description = "Create the DocC output directory"
run = "mkdir -p .build/documentation"

[tasks."docs:command-execution"]
description = "Build CommandExecution documentation"
depends = ["docs:prepare"]
run = "swift package --allow-writing-to-directory .build/documentation generate-documentation --target CommandExecution --output-path .build/documentation/CommandExecution.doccarchive --warnings-as-errors"

[tasks."docs:ffmpeg"]
description = "Build FFmpeg documentation"
depends = ["docs:prepare"]
run = "swift package --allow-writing-to-directory .build/documentation generate-documentation --target FFmpeg --output-path .build/documentation/FFmpeg.doccarchive --warnings-as-errors"

[tasks."docs:ffprobe"]
description = "Build FFprobe documentation"
depends = ["docs:prepare"]
run = "swift package --allow-writing-to-directory .build/documentation generate-documentation --target FFprobe --output-path .build/documentation/FFprobe.doccarchive --warnings-as-errors"

[tasks."docs:media-conversion"]
description = "Build MediaConversion documentation"
depends = ["docs:prepare"]
run = "swift package --allow-writing-to-directory .build/documentation generate-documentation --target MediaConversion --output-path .build/documentation/MediaConversion.doccarchive --warnings-as-errors"

[tasks."docs:media-discovery"]
description = "Build MediaDiscovery documentation"
depends = ["docs:prepare"]
run = "swift package --allow-writing-to-directory .build/documentation generate-documentation --target MediaDiscovery --output-path .build/documentation/MediaDiscovery.doccarchive --warnings-as-errors"

[tasks."docs:media-encoding"]
description = "Build MediaEncoding documentation"
depends = ["docs:prepare"]
run = "swift package --allow-writing-to-directory .build/documentation generate-documentation --target MediaEncoding --output-path .build/documentation/MediaEncoding.doccarchive --warnings-as-errors"

[tasks."docs:media-processing"]
description = "Build MediaProcessing documentation"
depends = ["docs:prepare"]
run = "swift package --allow-writing-to-directory .build/documentation generate-documentation --target MediaProcessing --output-path .build/documentation/MediaProcessing.doccarchive --warnings-as-errors"

[tasks."docs:media-remux"]
description = "Build MediaRemux documentation"
depends = ["docs:prepare"]
run = "swift package --allow-writing-to-directory .build/documentation generate-documentation --target MediaRemux --output-path .build/documentation/MediaRemux.doccarchive --warnings-as-errors"

[tasks."docs:media-repair"]
description = "Build MediaRepair documentation"
depends = ["docs:prepare"]
run = "swift package --allow-writing-to-directory .build/documentation generate-documentation --target MediaRepair --output-path .build/documentation/MediaRepair.doccarchive --warnings-as-errors"

[tasks."docs:media-subtitles"]
description = "Build MediaSubtitles documentation"
depends = ["docs:prepare"]
run = "swift package --allow-writing-to-directory .build/documentation generate-documentation --target MediaSubtitles --output-path .build/documentation/MediaSubtitles.doccarchive --warnings-as-errors"

[tasks."docs:preview"]
description = "Preview one DocC target; pass --target <target>"
raw_args = true
run = "swift package --disable-sandbox preview-documentation"

[tasks.format]
description = "Format Swift sources and tests"
run = "swift format --in-place --recursive Sources Tests"

[tasks.lint]
description = "Lint Swift sources and tests"
run = "swift format lint --recursive Sources Tests"
