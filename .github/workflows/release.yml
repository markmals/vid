name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Install Mise toolchain
        uses: jdx/mise-action@v3
        with:
          version: 2026.7.7
          install: true
          cache: true

      - name: Verify tag version
        run: |
          expected_version="${GITHUB_REF_NAME#v}"
          actual_version=$(swift run vid --version)
          if [[ "$actual_version" != "$expected_version" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match binary version $actual_version" >&2
            exit 1
          fi

      - name: Test
        run: swift test

      - name: Build universal macOS binary
        run: |
          swift build \
            -c release \
            --product vid \
            --triple arm64-apple-macosx13.0 \
            --scratch-path .build/release-arm64
          swift build \
            -c release \
            --product vid \
            --triple x86_64-apple-macosx13.0 \
            --scratch-path .build/release-x86_64

          arm64_bin=$(swift build \
            -c release \
            --product vid \
            --triple arm64-apple-macosx13.0 \
            --scratch-path .build/release-arm64 \
            --show-bin-path)
          x86_64_bin=$(swift build \
            -c release \
            --product vid \
            --triple x86_64-apple-macosx13.0 \
            --scratch-path .build/release-x86_64 \
            --show-bin-path)

          mkdir -p staging/macos artifacts
          lipo -create "$arm64_bin/vid" "$x86_64_bin/vid" -output staging/macos/vid
          strip -x staging/macos/vid
          staging/macos/vid --version
          tar -C staging/macos -czf "artifacts/vid-${GITHUB_REF_NAME}-macos-universal.tar.gz" vid

      - uses: actions/upload-artifact@v7
        with:
          name: macos
          path: artifacts/*.tar.gz
          if-no-files-found: error

  linux:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Install Mise toolchain
        uses: jdx/mise-action@v3
        with:
          version: 2026.7.7
          install: true
          cache: true

      - name: Install matching Static Linux SDK
        run: |
          swift sdk install \
            https://download.swift.org/swift-6.3.3-release/static-sdk/swift-6.3.3-RELEASE/swift-6.3.3-RELEASE_static-linux-0.1.0.artifactbundle.tar.gz \
            --checksum 87c3eaf908e67c0e13a84367119e12273cec1d2cd3d81f7d74bb36722d6b607b
          swift sdk list

      - name: Build static Linux binaries
        run: |
          swift="$(mise which swift)"
          "$swift" build \
            -c release \
            --product vid \
            --swift-sdk x86_64-swift-linux-musl \
            --scratch-path .build/release-linux-x86_64
          "$swift" build \
            -c release \
            --product vid \
            --swift-sdk aarch64-swift-linux-musl \
            --scratch-path .build/release-linux-aarch64

          x86_64_bin=$("$swift" build \
            -c release \
            --product vid \
            --swift-sdk x86_64-swift-linux-musl \
            --scratch-path .build/release-linux-x86_64 \
            --show-bin-path)
          aarch64_bin=$("$swift" build \
            -c release \
            --product vid \
            --swift-sdk aarch64-swift-linux-musl \
            --scratch-path .build/release-linux-aarch64 \
            --show-bin-path)

          mkdir -p staging/linux-x86_64 staging/linux-aarch64 artifacts
          llvm_objcopy="$(mise where swift)/usr/bin/llvm-objcopy"
          "$llvm_objcopy" --strip-all "$x86_64_bin/vid" staging/linux-x86_64/vid
          "$llvm_objcopy" --strip-all "$aarch64_bin/vid" staging/linux-aarch64/vid
          tar -C staging/linux-x86_64 -czf "artifacts/vid-${GITHUB_REF_NAME}-linux-x86_64.tar.gz" vid
          tar -C staging/linux-aarch64 -czf "artifacts/vid-${GITHUB_REF_NAME}-linux-aarch64.tar.gz" vid

      - uses: actions/upload-artifact@v7
        with:
          name: linux
          path: artifacts/*.tar.gz
          if-no-files-found: error

  publish:
    needs: [macos, linux]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create checksums
        working-directory: artifacts
        run: sha256sum vid-*.tar.gz > SHA256SUMS

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
          gh release upload "$GITHUB_REF_NAME" \
            artifacts/vid-*.tar.gz \
            artifacts/SHA256SUMS \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
