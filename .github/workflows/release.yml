name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode 26
        run: |
          xcode_path=$(find /Applications -maxdepth 1 -name 'Xcode_26*.app' | sort -V | tail -1)
          if [[ -z "$xcode_path" ]]; then
            echo "No Xcode 26 installation found" >&2
            exit 1
          fi
          sudo xcode-select -s "$xcode_path/Contents/Developer"
          swift --version

      - name: Verify tag version
        run: |
          expected_version="${GITHUB_REF_NAME#v}"
          actual_version=$(swift run vid --version)
          if [[ "$actual_version" != "$expected_version" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match binary version $actual_version" >&2
            exit 1
          fi

      - name: Test
        run: swift test

      - name: Build universal macOS binary
        run: |
          swift build \
            -c release \
            --product vid \
            --triple arm64-apple-macosx13.0 \
            --scratch-path .build/release-arm64
          swift build \
            -c release \
            --product vid \
            --triple x86_64-apple-macosx13.0 \
            --scratch-path .build/release-x86_64

          arm64_bin=$(swift build \
            -c release \
            --product vid \
            --triple arm64-apple-macosx13.0 \
            --scratch-path .build/release-arm64 \
            --show-bin-path)
          x86_64_bin=$(swift build \
            -c release \
            --product vid \
            --triple x86_64-apple-macosx13.0 \
            --scratch-path .build/release-x86_64 \
            --show-bin-path)

          mkdir -p staging/macos artifacts
          lipo -create "$arm64_bin/vid" "$x86_64_bin/vid" -output staging/macos/vid
          strip -x staging/macos/vid
          staging/macos/vid --version
          tar -C staging/macos -czf "artifacts/vid-${GITHUB_REF_NAME}-macos-universal.tar.gz" vid

      - uses: actions/upload-artifact@v7
        with:
          name: macos
          path: artifacts/*.tar.gz
          if-no-files-found: error

  linux:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Install matching open-source Swift toolchain
        run: |
          curl --fail --location --output swiftly.pkg \
            https://download.swift.org/swiftly/darwin/swiftly-1.1.2.pkg
          installer -pkg swiftly.pkg -target CurrentUserHomeDirectory
          ~/.swiftly/bin/swiftly init \
            --skip-install \
            --no-modify-profile \
            --quiet-shell-followup \
            --assume-yes
          ~/.swiftly/bin/swiftly install --use --assume-yes
          ~/.swiftly/bin/swift --version

      - name: Install matching Static Linux SDK
        run: |
          ~/.swiftly/bin/swift sdk install \
            https://download.swift.org/swift-6.4.x-branch/static-sdk/swift-6.4.x-DEVELOPMENT-SNAPSHOT-2026-07-14-a/swift-6.4.x-DEVELOPMENT-SNAPSHOT-2026-07-14-a_static-linux-0.1.0.artifactbundle.tar.gz \
            --checksum 41c7a53351a8dbcc8612038522d192561c61c3793ee25aa66406879e369b5330
          ~/.swiftly/bin/swift sdk list

      - name: Build static Linux binaries
        run: |
          swift=~/.swiftly/bin/swift
          "$swift" build \
            -c release \
            --product vid \
            --swift-sdk x86_64-swift-linux-musl \
            --scratch-path .build/release-linux-x86_64
          "$swift" build \
            -c release \
            --product vid \
            --swift-sdk aarch64-swift-linux-musl \
            --scratch-path .build/release-linux-aarch64

          x86_64_bin=$("$swift" build \
            -c release \
            --product vid \
            --swift-sdk x86_64-swift-linux-musl \
            --scratch-path .build/release-linux-x86_64 \
            --show-bin-path)
          aarch64_bin=$("$swift" build \
            -c release \
            --product vid \
            --swift-sdk aarch64-swift-linux-musl \
            --scratch-path .build/release-linux-aarch64 \
            --show-bin-path)

          mkdir -p staging/linux-x86_64 staging/linux-aarch64 artifacts
          ~/.swiftly/bin/llvm-objcopy --strip-all "$x86_64_bin/vid" staging/linux-x86_64/vid
          ~/.swiftly/bin/llvm-objcopy --strip-all "$aarch64_bin/vid" staging/linux-aarch64/vid
          tar -C staging/linux-x86_64 -czf "artifacts/vid-${GITHUB_REF_NAME}-linux-x86_64.tar.gz" vid
          tar -C staging/linux-aarch64 -czf "artifacts/vid-${GITHUB_REF_NAME}-linux-aarch64.tar.gz" vid

      - uses: actions/upload-artifact@v7
        with:
          name: linux
          path: artifacts/*.tar.gz
          if-no-files-found: error

  publish:
    needs: [macos, linux]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create checksums
        working-directory: artifacts
        run: sha256sum vid-*.tar.gz > SHA256SUMS

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
          gh release upload "$GITHUB_REF_NAME" \
            artifacts/vid-*.tar.gz \
            artifacts/SHA256SUMS \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
